version: '3.8'

services:
  bot:
    build: .
    restart: always
    env_file:
      - .env
    environment:
      # Docker ichida baza manzili 'localhost' emas, 'db' (konteyner nomi) bo'lishi kerak
      - DATABASE_URL=postgres://postgres:kali@db:5432/tanlov?sslmode=disable
    depends_on:
      - db
    
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: kali
      POSTGRES_DB: tanlov
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
